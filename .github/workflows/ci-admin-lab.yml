name: CI - Admin Lab

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/admin-lab/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'eslint.config.js'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint admin-lab
        run: pnpm --filter admin-lab lint

      - name: Type check admin-lab
        run: pnpm --filter admin-lab exec tsc --noEmit

      - name: Build admin-lab
        run: pnpm --filter admin-lab build
